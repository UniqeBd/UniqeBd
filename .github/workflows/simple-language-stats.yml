name: Simple Language Statistics Update

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
  repository_dispatch:
    types: [update-stats]
  workflow_dispatch:
    inputs:
      include_private:
        description: 'Include private repositories'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (test without making changes)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

concurrency:
  group: language-stats-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update language statistics
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN != '' && secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: python scripts/update_language_stats.py

      - name: Show changes (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: |
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            echo "Changes detected (dry run):"
            git diff --staged README.md
          fi

      - name: Commit and push changes
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add README.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: auto-update language statistics"
          git push origin HEAD:main
